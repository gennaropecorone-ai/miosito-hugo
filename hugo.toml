    weight = 1
    url = "/"

[[menu.main]]
    name = "[ DATABASE ]"
    weight = 2
    url = "posts/"

[[menu.main]]
    name = "[ CHI SIAMO ]"
    weight = 3
    url = "about/"

[[menu.main]]
    name = "[ GUIDA ]"
    weight = 4
    url = "guida/"

# --- ABILITA GRAFICA PDF NELLA PAGINA GUIDA ---
[markup]
