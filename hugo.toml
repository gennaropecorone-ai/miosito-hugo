baseURL = 'https://gennaropecorone-ai.github.io/miosito-hugo/'
languageCode = 'it-it'
title = 'G&G CYBER-LAB'
theme = 'hugo-coder'
publishDir = 'docs'

[params]
    author = "G&G"
    description = "SISTEMA OPERATIVO G&G - ACCESSO AUTORIZZATO"
    info = "Analisi Dati | Cybersecurity | AI Research"
    avatarurl = "images/GG.jpg"
    
    # --- STYLE HACKER ---
    colorScheme = "dark"
    avatarSize = "350px"
    layout = "circle" 

    # Colori Verde Neon su Nero
    [params.colors]
        primary = "#00FF00"
        background = "#000000"
        text = "#00FF00"

# --- NAVBAR (I tasti in alto) ---
[[menu.main]]
