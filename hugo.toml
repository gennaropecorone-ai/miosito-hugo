baseURL = 'https://gennaropecorone-ai.github.io/miosito-hugo/'
languageCode = 'it-it'
title = 'G&G CYBER-LAB'
theme = 'hugo-coder'
publishDir = 'docs'

[params]
    author = "G&G"
    description = "Sito ufficiale G&G - Protezione & Innovazione"
    info = "Sistemi in sicurezza. Benvenuti nel terminale."
    avatarurl = "images/GG.jpg"
    
    # --- STYLE CYBERSECURITY ---
    colorScheme = "dark" # Forza il tema scuro
    avatarSize = "350px" # Immagine di DIO/GG ancora più grande
    layout = "circle" 
    
    # Colori personalizzati (Verde Matrix)
    # Questi codici rendono il sito stile terminale
    [params.colors]
        primary = "#00FF00" # Verde Neon
        background = "#000000" # Nero profondo
        text = "#00FF00" # Testo Verde

    # Navbar Sticky (Resta fissa in alto)
    stickyHeader = true

    # SOCIAL ICONS XL
    [[params.social]]
        name = "Github"
        icon = "fa fa-2x fa-terminal" # Icona terminale per stile hacker
        weight = 1
        url = "https://github.com/gennaropecorone-ai/"
    [[params.social]]
        name = "Security"
        icon = "fa fa-2x fa-shield" # Icona scudo per cybersecurity
        weight = 2
        url = "#"

